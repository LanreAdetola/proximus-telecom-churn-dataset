name: Run AutoML Churn Classification

on:
  workflow_dispatch:
    inputs:
      max_trials:
        description: "Maximum number of AutoML trials"
        required: false
        default: "20"
        type: string
      timeout_minutes:
        description: "Total AutoML job timeout (minutes)"
        required: false
        default: "60"
        type: string

permissions:
  id-token: write
  contents: read

env:
  AZURE_ML_WORKSPACE: mlw-proximus-churn-dev
  AZURE_RESOURCE_GROUP: rg-proximus-churn-dev

jobs:
  submit-automl:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Azure ML CLI extension
        run: |
          az extension add --name ml --yes
          az configure --defaults \
            workspace=${{ env.AZURE_ML_WORKSPACE }} \
            group=${{ env.AZURE_RESOURCE_GROUP }}

      - name: Register environment
        run: |
          az ml environment create \
            --file environments/env-training.yml \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --workspace-name ${{ env.AZURE_ML_WORKSPACE }}

      - name: Register datastore
        run: |
          STORAGE_NAME=$(az ml workspace show \
            --query storage_account \
            --output tsv | xargs -I{} az storage account show --ids {} --query name --output tsv)
          sed "s/\${STORAGE_ACCOUNT_NAME}/$STORAGE_NAME/" datastores/datastore-churn-blob.yml | \
            az ml datastore create --file /dev/stdin

      - name: Register data asset
        run: |
          az ml data create \
            --file data/data-asset-churn-v1.yml

      - name: Patch AutoML limits from inputs
        run: |
          sed -i \
            -e 's/max_trials: .*/max_trials: ${{ inputs.max_trials }}/' \
            -e 's/timeout_minutes: .*/timeout_minutes: ${{ inputs.timeout_minutes }}/' \
            jobs/automl-churn-classification.yml

      - name: Submit AutoML job
        run: |
          az ml job create \
            --file jobs/automl-churn-classification.yml \
            --stream

      - name: Azure Logout
        if: always()
        run: az logout
