name: Provision Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev

permissions:
  id-token: write   # OIDC federation
  contents: read

env:
  AZURE_RESOURCE_GROUP_DEV: rg-proximus-mlops-dev

jobs:
  deploy-infra:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: ${{ github.event_name == 'workflow_dispatch' && fromJson(format('["{0}"]', inputs.environment)) || fromJson('["dev"]') }}

    environment: ${{ matrix.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set resource group
        id: rg
        run: |
          echo "name=${{ env.AZURE_RESOURCE_GROUP_DEV }}" >> "$GITHUB_OUTPUT"

      - name: Ensure resource group exists
        run: |
          az group create \
            --name "${{ steps.rg.outputs.name }}" \
            --location westeurope \
            --tags project=proximus-churn environment=${{ matrix.environment }}

      - name: Deploy Bicep template
        id: deploy
        uses: azure/arm-deploy@v2
        with:
          scope: resourcegroup
          resourceGroupName: ${{ steps.rg.outputs.name }}
          deploymentName: main-${{ github.run_id }}
          template: infra/main.bicep
          parameters: infra/params.${{ matrix.environment }}.json
          failOnStdErr: false

      - name: Dump deployment errors (if failed)
        if: failure()
        run: |
          RG="${{ steps.rg.outputs.name }}"
          DEPLOY="main-${{ github.run_id }}"

          echo "Deployment show:"
          az deployment group show -g "$RG" -n "$DEPLOY" --query "{state:properties.provisioningState,error:properties.error}" -o jsonc || true

          echo "Deployment operations (failed only):"
          az deployment operation group list -g "$RG" -n "$DEPLOY" \
            --query "[?properties.provisioningState=='Failed'].{resource:properties.targetResource.resourceName,type:properties.targetResource.resourceType,status:properties.provisioningState,message:properties.statusMessage}" \
            -o jsonc || true

      - name: Azure Logout
        if: always()
        run: az logout
