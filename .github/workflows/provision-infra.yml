name: Provision Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev

permissions:
  id-token: write   # OIDC federation
  contents: read

env:
  AZURE_RESOURCE_GROUP_DEV: rg-proximus-churn-dev

jobs:
  deploy-infra:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: ${{ github.event_name == 'workflow_dispatch' && fromJson(format('["{0}"]', inputs.environment)) || fromJson('["dev"]') }}

    environment: ${{ matrix.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set resource group
        id: rg
        run: |
          echo "name=${{ env.AZURE_RESOURCE_GROUP_DEV }}" >> "$GITHUB_OUTPUT"

      - name: Ensure resource group exists
        run: |
          az group create \
            --name "${{ steps.rg.outputs.name }}" \
            --location westeurope \
            --tags project=proximus-churn environment=${{ matrix.environment }}

      - name: Deploy Bicep template
        uses: azure/arm-deploy@v2
        with:
          scope: resourcegroup
          resourceGroupName: ${{ steps.rg.outputs.name }}
          template: infra/main.bicep
          parameters: infra/params.${{ matrix.environment }}.json
          failOnStdErr: false

      - name: Azure Logout
        if: always()
        run: az logout
